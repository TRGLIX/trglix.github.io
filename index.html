<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sin Servicio - Apagón</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    body {
      background: #000;
      color: #00ffff;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .rayas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(45deg, rgba(63, 88, 88, 0.2) 0px, rgba(63, 88, 88, 0.2) 20px, rgba(0, 0, 0, 0.7) 20px, rgba(0, 0, 0, 0.7) 40px);
      animation: moverRayas 10s linear infinite;
      z-index: -1; /* Asegura que las rayas estén detrás del contenido */
    }

    .icono {
      font-size: 12rem;
      color: #ff0040;
      text-shadow: 0 0 20px #ff0040, 0 0 40px #ff0040;
      animation: parpadeo 1s infinite;
    }

    .mensaje {
      font-size: 4rem;
      margin-top: 1rem;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
      animation: scan 4s infinite alternate;
    }

    .submensaje {
      font-size: 1.5rem;
      margin-top: 1rem;
      color: #aaa;
      opacity: 0.8;
    }

    @keyframes moverRayas {
      0% { background-position: 0 0; }
      100% { background-position: 200px 0; }
    }

    @keyframes parpadeo {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes scan {
      0% {
        text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
      }
      100% {
        text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff;
      }
    }

    .boton {
      margin-top: 2rem;
      background: none;
      border: 2px solid #00ffff;
      padding: 1rem 2rem;
      font-size: 1.2rem;
      color: #00ffff;
      text-transform: uppercase;
      border-radius: 10px;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: 0.3s ease;
      box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff inset;
      animation: latido 2s infinite;
    }

    .boton::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(0, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    .boton:hover::before {
      left: 100%;
    }

    .boton:hover {
      background-color: rgba(0, 255, 255, 0.1);
      transform: scale(1.05);
    }

    @keyframes latido {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
  </style>
</head>
<body>
  <div class="rayas"></div>
  <div class="icono">❗</div>
  <div class="mensaje">SIN SERVICIO</div>
  <div class="submensaje">Apagón en curso en España</div>
  <a class="boton" href="https://trglix-inc.betteruptime.com/" target="_blank">Ver estado</a>
</body>
</html>
