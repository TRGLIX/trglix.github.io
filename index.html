<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icons8-usuario-100.png">
</head>
<body>
    <!-- Formulario de inicio de sesión -->
    <div id="login-container" class="centered-container">
        <img src="TRGLIX.svg" width="270">
        <h2>Iniciar Sesión</h2> 
        <div class="card">
            <div class="loader">
                <div class="words">
                    <span class="word">SEGURO🔒</span>
                    <span class="word">PRIVADO🔏</span>
                    <span class="word">VPN🌐</span>
                    <span class="word">CERRADO❌</span>
                    <span class="word">ENCRIPTADO🔏</span>
                </div>
            </div>
        </div>
        <div id="error-message" class="error"></div>
        <form id="login-form">
            <label for="username">Usuario</label>
            <input type="text" id="username" required><br><br>

            <label for="password">Contraseña</label>
            <input type="password" id="password" required><br><br>

            <button type="submit">Iniciar Sesión</button>
        </form>
    </div>
