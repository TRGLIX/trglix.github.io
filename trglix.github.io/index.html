<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRSTUDIOS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fff;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }
        .background-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: 0;
        }
        .animated-exclamation {
            position: absolute;
            font-size: 50px;
            color: rgba(255, 0, 0, 0.6);
            animation: fall linear infinite;
            animation-timing-function: linear;
        }
        @keyframes fall {
            from {
                transform: translateY(-100vh);
            }
            to {
                transform: translateY(100vh);
            }
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            position: relative;
            z-index: 10;
        }
        h1 {
            color: #000;
        }
        p {
            color: #333;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const background = document.querySelector(".background-container");
            let fragment = document.createDocumentFragment();
            for (let i = 0; i < 100; i++) {
                let exclamation = document.createElement("div");
                exclamation.classList.add("animated-exclamation");
                exclamation.innerHTML = "⚠️";
                exclamation.style.left = Math.random() * 100 + "vw";
                exclamation.style.animationDuration = (Math.random() * 3 + 2) + "s";
                fragment.appendChild(exclamation);
            }
            background.appendChild(fragment);
        });
    </script>
</head>
<body>
    <div class="background-container"></div>
    <div class="container">
        <h1>PÁGINA EN MANTENIMIENTO</h1>
        <p>INTENTELO MÁS TARDE.</p>
    </div>
</body>
</html>
