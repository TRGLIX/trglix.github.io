<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="logo V2.png">
</head>
<body>
    <!-- Formulario de inicio de sesión -->
    <div id="login-container" class="centered-container">
        <img src="logo V2.png" width="270">
        <h2>Iniciar Sesión</h2> 
        <div class="card">
            <div class="loader">
                <div class="words">
                    <span class="word">SEGURO🔒</span>
                    <span class="word">PRIVADO🔏</span>
                    <span class="word">VPN🌐</span>
                    <span class="word">CERRADO❌</span>
                    <span class="word">ENCRIPTADO🔏</span>
                </div>
            </div>
        </div>
        <div id="error-message" class="error"></div>
        <form id="login-form">
            <label for="username">Usuario:</label>
            <input type="text" id="username" required><br><br>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" required><br><br>

            <button type="submit">Iniciar Sesión</button>
        </form>
    </div>

    <!-- Panel de Administración -->
    <div id="admin-panel" class="hidden centered-container">
        <img src="TR_LOGO.jpg" width="110">
        <h2>Panel de Administración</h2>
        <!-- Aquí irá el mensaje dinámico de bienvenida -->
        <h3 id="welcome-message">BIENVENIDO 👋</h3>

        <div id="status-message"></div>

        <button id="start-server">Encender Servidor</button>
        <button id="stop-server">Apagar Servidor</button>

        <div class="group">
            <svg stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" class="icon">
                <path d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" stroke-linejoin="round" stroke-linecap="round"></path>
            </svg>
            <input class="input" type="password" placeholder="password">
        </div>

        <h3>STATUS</h3> 
        <div class="terminal-loader">
            <div class="terminal-header">
                <div class="terminal-title">Status</div>
                <div class="terminal-controls">
                    <div class="control close"></div>
                    <div class="control minimize"></div>
                    <div class="control maximize"></div>
                </div>
            </div>
            <div class="text">Loading...</div>
        </div>

        <button id="logout">Cerrar Sesión</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
